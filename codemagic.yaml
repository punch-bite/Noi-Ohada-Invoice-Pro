workflows:
  release:
    name: Release Build
    environment:
      vars:
        FLUTTER_VERSION: 3.41.9  # Ajustez si nécessaire
      flutter: stable
    scripts:
      - name: Décoder le Keystore JKS
        script: |
          echo "Recréation du fichier de clé..."
          echo $KEYSTORE_BASE64 | base64 --decode > android/app/upload-keystore.jks

      - name: Générer local.properties pour Gradle
        script: |
          echo "Génération de local.properties..."
          echo "flutter.sdk=$FCI_FLUTTER_HOME" > android/local.properties
          echo "release.keystore.password=$KEYSTORE_PASSWORD" >> android/local.properties
          echo "release.key.alias=$KEY_ALIAS" >> android/local.properties
          echo "release.key.password=$KEY_PASSWORD" >> android/local.properties

      - name: Set up google-services.json
        script: |
          echo "$ANDROID_FIREBASE_JSON" > android/app/google-services.json

      - name: Créer le fichier .env
        script: |
          echo "Génération du fichier .env pour le build..."
          # Remplacez par les variables que vous avez définies dans l'interface Codemagic
          echo "API_URL=$API_URL" > .env
          echo "ANOTHER_SECRET_KEY=$ANOTHER_SECRET_KEY" >> .env
          
      - name: Nettoyer le projet
        script: flutter clean
        
      - name: Installer les dépendances
        script: |
           flutter pub pub cache clean --force # Nettoie le cache de Codemagic
           flutter pub upgrade --major-versions # Force l'alignement sur les dernières versions compatibles
           flutter pub get
      
      - name: Générer les fichiers de build
        script: flutter pub run build_runner build --delete-conflicting-outputs
      
      - name: Builder l'APK Release
        script: flutter build apk --release --split-per-abi
      
      - name: Builder l'App Bundle (AAB)
        script: flutter build appbundle --release
      
      - name: Vérifier la signature
        script: |
          if [ -f "android/app/upload-keystore.jks" ]; then
            echo "✅ Keystore trouvé"
          else
            echo "⚠️ Keystore non trouvé, APK non signé"
          fi
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
      - build/app/outputs/bundle/release/*.aab
    publishing:
      email:
        recipients:
          - nixmmobilier@gmail.com
        notify:
          success: true
          failure: true