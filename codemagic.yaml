workflows:
  release:
    name: Release Build
    environment:
      vars:
        FLUTTER_VERSION: 3.41.9  # Ajustez si nécessaire
      flutter: stable
    scripts:
      - name: Générer local.properties pour Gradle
        script: |
          echo "Génération de local.properties..."
          echo "flutter.sdk=$FCI_FLUTTER_HOME" > android/local.properties
          
      - name: Nettoyer le projet
        script: flutter clean
        
      - name: Installer les dépendances
        script: flutter pub get
      
      - name: Générer les fichiers de build
        script: flutter pub run build_runner build --delete-conflicting-outputs
      
      - name: Builder l'APK Release
        script: flutter build apk --release --split-per-abi
      
      - name: Builder l'App Bundle (AAB)
        script: flutter build appbundle --release
      
      - name: Vérifier la signature
        script: |
          if [ -f "android/app/upload-keystore.jks" ]; then
            echo "✅ Keystore trouvé"
          else
            echo "⚠️ Keystore non trouvé, APK non signé"
          fi
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
      - build/app/outputs/bundle/release/*.aab
    publishing:
      email:
        recipients:
          - nixmmobilier@gmail.com
        notify:
          success: true
          failure: true