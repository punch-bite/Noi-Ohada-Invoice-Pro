name: noi_ohada_invoice_pro
description: "Gestion de factures conforme OHADA"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0' # Flutter 3.41 nécessite un SDK Dart récent

dependencies:
  flutter:
    sdk: flutter
  
  # --- Architecture & State Management ---
  provider: ^6.1.2
  go_router: ^14.6.0
  json_annotation: ^4.9.0

  # --- Firebase (Compatible avec Flutter 3.41) ---
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4

  # --- Database & Local Storage ---
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.2

  # --- OHADA Compliance & Business Logic ---
  intl: ^0.19.0
  uuid: ^4.5.1
  decimal: ^2.3.3 # RECOMMANDÉ : Remplacez les doubles par Decimal pour la comptabilité OHADA
  
  # --- PDF & Reporting ---
  pdf: ^3.12.0
  printing: ^5.14.0
  csv: ^6.0.0
  fl_chart: ^0.69.0

  # --- Utilitaires & Sécurité ---
  dart_dash_otp: ^2.0.0
  qr_flutter: ^4.1.0
  mailer: ^6.4.0
  http: ^1.2.2
  dio: ^5.7.0
  permission_handler: ^11.3.1
  connectivity_plus: ^6.1.0
  path_provider: ^2.0.12
  image_picker: ^1.1.2
  flutter_dotenv: ^6.0.1
  local_auth: 3.0.2
  flutter_contacts: ^2.0.0

  # --- UI ---
  fluttertoast: ^8.2.8
  flutter_slidable: ^3.1.1
  shimmer: ^3.0.0
  webview_flutter: ^4.8.0
  flutter_staggered_animations: ^1.1.1
  simple_animations: ^5.0.3
  share_plus: ^12.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.3.3
  hive_generator: ^2.0.1
  json_serializable: 6.8.0
  mockito: ^5.4.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - .env
  fonts:
    - family: NoiPolice
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
        - asset: assets/fonts/Roboto-Bold.ttf
          weight: 700
        - asset: assets/fonts/Roboto-Medium.ttf
        - asset: assets/fonts/Roboto-Condensed.ttf
          weight: 500
        - asset: assets/fonts/Roboto-Light.ttf
          weight: 300