name: noi_ohada_invoice_pro
description: Gestion de factures conforme OHADA
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^13.0.1
  
  # State Management
  provider: ^6.1.1
  dart_dash_otp: ^2.0.0         # Génération et vérification TOTP
  qr_flutter: ^4.1.0  
  totp_generator: ^1.0.0

  # Database
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  mailer: ^6.1.0

  # PDF
  pdf: ^3.10.4
  printing: ^5.11.1
  csv: ^6.0.0

  # UI
  flutter_slidable: ^3.0.1
  intl: 0.17.0
  image_picker: ^1.0.7
  fluttertoast: ^8.2.4
  shimmer: ^3.0.0
  
  # Firebase
  firebase_core: ^2.25.4
  firebase_auth: ^4.17.4
  cloud_firestore: ^4.15.4
  
  # Utilitaires
  uuid: ^4.3.3
  share_plus: ^7.2.1
  path_provider: ^2.1.2
  permission_handler: ^11.3.1
  connectivity_plus: ^5.0.2
  flutter_secure_storage: ^9.2.2
  flutter_dotenv: ^5.1.0
  
  # Charts
  charts_flutter: ^0.12.0
  fl_chart: ^0.68.0
  
  # Animations
  animated_widgets: ^1.0.0
  simple_animations: ^5.0.0
  flutter_staggered_animations: ^1.1.1

  # WebView
  webview_flutter: ^4.7.0

  # HTTP & Payments
  http: ^1.1.0
  dio: ^5.4.0
  local_auth: ^2.1.6
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.7
  hive_generator: ^2.0.1
  mockito: ^5.4.0 
  
flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - .env